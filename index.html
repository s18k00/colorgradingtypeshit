<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fluid Curve - Big Preview</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, sans-serif;
            background-color: #111; color: #eee;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER RINGKAS */
        header { background: #000; padding: 8px; text-align: center; border-bottom: 1px solid #333; flex-shrink: 0; }
        header h1 { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }

        .main-container { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

        /* PREVIEW AREA: Dibuat maksimal */
        #preview-panel {
            flex: 1; /* Mengambil sisa ruang paling besar */
            background: #151515;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; 
            position: relative;
            padding: 5px; /* Padding minimal agar foto besar */
        }
        #imageCanvas { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: repeating-conic-gradient(#222 0% 25%, #2a2a2a 0% 50%) 50% / 16px 16px;
        }

        /* CONTROLS AREA: Lebih compact & scrollable */
        #controls-panel {
            background: #222; 
            padding: 15px 10px;
            border-top: 1px solid #444;
            display: flex; flex-direction: column; gap: 12px;
            flex-shrink: 0;
            max-height: 55vh; /* Jangan sampai memakan lebih dari setengah layar */
            overflow-y: auto;
        }

        .input-group { background: #333; padding: 8px; border-radius: 8px; }
        input[type="file"] { font-size: 0.7rem; width: 100%; }

        .tabs { display: flex; background: #000; border-radius: 6px; padding: 2px; gap: 2px; }
        .tab { flex: 1; text-align: center; padding: 8px 0; cursor: pointer; font-size: 0.65rem; font-weight: bold; border-radius: 4px; }
        .tab.active { background: #444; }
        .tab[data-chan="all"] { color: #fff; }
        .tab[data-chan="r"] { color: #ff5555; }
        .tab[data-chan="g"] { color: #55ff55; }
        .tab[data-chan="b"] { color: #5555ff; }

        .curve-wrapper {
            width: 220px; height: 220px; /* Sedikit diperkecil agar tidak makan tempat */
            margin: 0 auto; position: relative; background: #000; border: 1px solid #555;
            touch-action: none; flex-shrink: 0;
        }
        #curveCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }

        .action-row { display: flex; gap: 8px; }
        .btn { border: none; color: #fff; padding: 12px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; cursor: pointer; text-align: center; flex: 1; }
        .btn-gray { background: #444; }
        .btn-green { background: #1b5e20; }
        .btn-disabled { opacity: 0.2; pointer-events: none; }

        /* DESKTOP MODE */
        @media (min-width: 768px) {
            .main-container { flex-direction: row; }
            #controls-panel { width: 300px; height: 100%; max-height: none; border-top: none; border-right: 1px solid #333; }
            .curve-wrapper { width: 256px; height: 256px; }
        }
    </style>
</head>
<body>

<header><h1>PRO PHOTO CURVE</h1></header>

<div class="main-container">
    <main id="preview-panel">
        <canvas id="imageCanvas"></canvas>
    </main>

    <aside id="controls-panel">
        <div class="input-group">
            <input type="file" id="imageLoader" accept="image/*" />
        </div>

        <div class="tabs">
            <div class="tab active" data-chan="all">RGB</div>
            <div class="tab" data-chan="r">RED</div>
            <div class="tab" data-chan="g">GREEN</div>
            <div class="tab" data-chan="b">BLUE</div>
        </div>
        
        <div class="curve-wrapper">
            <canvas id="curveCanvas" width="256" height="256"></canvas>
        </div>
        
        <div class="action-row">
            <button class="btn btn-gray" id="resetCurve">RESET</button>
            <a id="downloadLink" class="btn btn-green btn-disabled">SIMPAN</a>
        </div>
        <p style="font-size: 0.6rem; color: #666; text-align: center;">Tarik kurva untuk edit. Double tap titik untuk hapus.</p>
    </aside>
</div>

<script>
    // --- Script Logika (Sama dengan sebelumnya, tetap dipertahankan kestabilannya) ---
    const imageLoader = document.getElementById('imageLoader');
    const imageCanvas = document.getElementById('imageCanvas');
    const imgCtx = imageCanvas.getContext('2d', { willReadFrequently: true });
    const curveCanvas = document.getElementById('curveCanvas');
    const curveCtx = curveCanvas.getContext('2d');
    const downloadLink = document.getElementById('downloadLink');

    let originalImgData = null;
    let currentChannel = 'all';
    let draggedPointIndex = -1;
    const channelData = {
        all: [{ x: 0, y: 256 }, { x: 256, y: 0 }],
        r: [{ x: 0, y: 256 }, { x: 256, y: 0 }],
        g: [{ x: 0, y: 256 }, { x: 256, y: 0 }],
        b: [{ x: 0, y: 256 }, { x: 256, y: 0 }]
    };

    imageLoader.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const maxDim = 1600; // Ukuran sedikit lebih besar untuk kualitas
                let w = img.width, h = img.height;
                if (w > maxDim || h > maxDim) {
                    const ratio = Math.min(maxDim/w, maxDim/h);
                    w *= ratio; h *= ratio;
                }
                imageCanvas.width = w; imageCanvas.height = h;
                imgCtx.drawImage(img, 0, 0, w, h);
                originalImgData = imgCtx.getImageData(0, 0, w, h);
                downloadLink.classList.remove('btn-disabled');
                applyCurve();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function getSplineLUT(pts) {
        const n = pts.length;
        const x = pts.map(p => p.x);
        const y = pts.map(p => 256 - p.y);
        const lut = new Uint8ClampedArray(256);
        const dx = [], dy = [], ms = [];
        for (let i = 0; i < n - 1; i++) {
            dx[i] = x[i+1] - x[i]; dy[i] = y[i+1] - y[i]; ms[i] = dy[i] / dx[i];
        }
        const c1s = [ms[0]];
        for (let i = 0; i < n - 2; i++) {
            const m = ms[i], mNext = ms[i+1];
            if (m * mNext <= 0) c1s.push(0);
            else {
                const c = dx[i] + dx[i+1];
                c1s.push(3 * c / ((c + dx[i+1]) / m + (c + dx[i]) / mNext));
            }
        }
        c1s.push(ms[n - 2]);
        const c2s = [], c3s = [];
        for (let i = 0; i < n - 1; i++) {
            const c1 = c1s[i], m = ms[i], invDx = 1 / dx[i], common = c1 + c1s[i+1] - 2 * m;
            c2s.push((m - c1 - common) * invDx); c3s.push(common * invDx * invDx);
        }
        for (let i = 0; i < 256; i++) {
            let j = n - 2;
            while (j > 0 && x[j] > i) j--;
            const d = i - x[j];
            lut[i] = y[j] + c1s[j] * d + c2s[j] * d * d + c3s[j] * d * d * d;
        }
        return lut;
    }

    function drawCurve() {
        curveCtx.fillStyle = "#000";
        curveCtx.fillRect(0,0,256,256);
        curveCtx.strokeStyle = '#222';
        for(let i=1; i<4; i++) {
            curveCtx.beginPath(); curveCtx.moveTo(i*64, 0); curveCtx.lineTo(i*64, 256); curveCtx.stroke();
            curveCtx.beginPath(); curveCtx.moveTo(0, i*64); curveCtx.lineTo(256, i*64); curveCtx.stroke();
        }
        const colors = { all: '#fff', r: '#ff4444', g: '#44ff44', b: '#4444ff' };
        const lut = getSplineLUT(channelData[currentChannel]);
        curveCtx.strokeStyle = colors[currentChannel];
        curveCtx.lineWidth = 3;
        curveCtx.beginPath(); curveCtx.moveTo(0, 256 - lut[0]);
        for(let x=1; x<256; x++) curveCtx.lineTo(x, 256 - lut[x]);
        curveCtx.stroke();
        channelData[currentChannel].forEach(p => {
            curveCtx.fillStyle = colors[currentChannel];
            curveCtx.beginPath(); curveCtx.arc(p.x, p.y, 8, 0, Math.PI*2); curveCtx.fill();
            curveCtx.strokeStyle = '#fff'; curveCtx.stroke();
        });
    }

    function applyCurve() {
        if (!originalImgData) return;
        const luts = { 
            all: getSplineLUT(channelData.all), 
            r: getSplineLUT(channelData.r), 
            g: getSplineLUT(channelData.g), 
            b: getSplineLUT(channelData.b) 
        };
        const newImgData = imgCtx.createImageData(imageCanvas.width, imageCanvas.height);
        const src = originalImgData.data; const dst = newImgData.data;
        for (let i = 0; i < src.length; i += 4) {
            dst[i]   = luts.all[luts.r[src[i]]];   
            dst[i+1] = luts.all[luts.g[src[i+1]]]; 
            dst[i+2] = luts.all[luts.b[src[i+2]]]; 
            dst[i+3] = src[i+3];                   
        }
        imgCtx.putImageData(newImgData, 0, 0);
    }

    function setupEvents() {
        const getCoord = (e) => {
            const rect = curveCanvas.getBoundingClientRect();
            const clientX = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
            const clientY = (e.touches && e.touches[0]) ? e.touches[0].clientY : e.clientY;
            return { 
                x: (clientX - rect.left) * (256 / rect.width), 
                y: (clientY - rect.top) * (256 / rect.height) 
            };
        };

        const onStart = (e) => {
            const pos = getCoord(e);
            const pts = channelData[currentChannel];
            const idx = pts.findIndex(p => Math.hypot(p.x - pos.x, p.y - pos.y) < 25);
            if(idx !== -1) draggedPointIndex = idx;
            else if(pos.x > 5 && pos.x < 251) {
                const newPt = { x: pos.x, y: pos.y };
                pts.push(newPt); pts.sort((a,b) => a.x - b.x);
                draggedPointIndex = pts.indexOf(newPt);
                drawCurve(); applyCurve();
            }
        };

        const onMove = (e) => {
            if(draggedPointIndex === -1) return;
            if(e.cancelable) e.preventDefault();
            const pos = getCoord(e);
            const pts = channelData[currentChannel];
            let mx = pos.x; let my = Math.max(0, Math.min(256, pos.y));
            if(draggedPointIndex === 0) mx = 0;
            else if(draggedPointIndex === pts.length-1) mx = 256;
            else mx = Math.max(pts[draggedPointIndex-1].x + 2, Math.min(pts[draggedPointIndex+1].x - 2, mx));
            pts[draggedPointIndex].x = mx; pts[draggedPointIndex].y = my;
            drawCurve(); applyCurve();
        };

        curveCanvas.addEventListener('mousedown', onStart);
        curveCanvas.addEventListener('touchstart', onStart, {passive: false});
        window.addEventListener('mousemove', onMove);
        window.addEventListener('touchmove', onMove, {passive: false});
        window.addEventListener('mouseup', () => draggedPointIndex = -1);
        window.addEventListener('touchend', () => draggedPointIndex = -1);
        
        let lastTap = 0;
        curveCanvas.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTap < 300) {
                const pos = getCoord(e.changedTouches ? e.changedTouches[0] : e);
                const pts = channelData[currentChannel];
                const idx = pts.findIndex(p => Math.hypot(p.x - pos.x, p.y - pos.y) < 30);
                if(idx > 0 && idx < pts.length - 1) {
                    pts.splice(idx, 1); drawCurve(); applyCurve();
                }
            }
            lastTap = now;
        });
    }

    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelector('.tab.active').classList.remove('active');
            tab.classList.add('active');
            currentChannel = tab.dataset.chan;
            drawCurve();
        };
    });

    document.getElementById('resetCurve').onclick = () => {
        channelData[currentChannel] = [{ x: 0, y: 256 }, { x: 256, y: 0 }];
        drawCurve(); applyCurve();
    };

    downloadLink.onclick = (e) => {
        if (downloadLink.classList.contains('btn-disabled')) return e.preventDefault();
        downloadLink.href = imageCanvas.toDataURL("image/png");
        downloadLink.download = "edit_mobile.png";
    };

    setupEvents(); drawCurve();
</script>
</body>
</html>
