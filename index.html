<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Curve Editor Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #1a1a1a; color: #e0e0e0;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        header { background: #111; padding: 12px 20px; border-bottom: 1px solid #333; flex-shrink: 0; }
        header h1 { font-size: 1rem; letter-spacing: 1px; color: #fff; }

        .main-container { display: flex; flex: 1; height: calc(100vh - 45px); overflow: hidden; }

        /* SIDEBAR */
        #controls-panel {
            width: 320px; min-width: 320px; background: #222; padding: 20px;
            border-right: 1px solid #333; display: flex; flex-direction: column; gap: 15px; overflow-y: auto;
        }

        .tabs { display: flex; background: #000; border-radius: 6px; padding: 3px; gap: 2px; }
        .tab {
            flex: 1; text-align: center; padding: 8px 0; cursor: pointer;
            font-size: 0.7rem; font-weight: bold; border-radius: 4px; transition: 0.2s;
        }
        .tab[data-chan="all"] { color: #fff; }
        .tab[data-chan="r"] { color: #ff5555; }
        .tab[data-chan="g"] { color: #55ff55; }
        .tab[data-chan="b"] { color: #5555ff; }
        .tab.active { background: #333; }

        #curve-container {
            width: 256px; height: 256px; background: #000;
            border: 1px solid #444; margin: 10px auto; position: relative; touch-action: none;
        }
        #curveCanvas { position: absolute; top: 0; left: 0; cursor: crosshair; }

        .btn {
            border: none; color: #fff; padding: 12px; border-radius: 6px;
            font-size: 0.8rem; font-weight: bold; cursor: pointer; width: 100%;
            text-align: center; transition: 0.2s; text-decoration: none;
        }
        .btn-gray { background: #3a3a3a; border: 1px solid #4a4a4a; }
        .btn-green { background: #2e7d32; margin-top: auto; border: 1px solid #388e3c; }
        .btn-green.disabled { background: #222; color: #555; border-color: #333; cursor: not-allowed; }

        /* PREVIEW */
        #preview-panel {
            flex: 1; background: #151515; display: flex;
            justify-content: center; align-items: center; padding: 30px; overflow: hidden;
        }
        .canvas-wrapper { max-width: 100%; max-height: 100%; display: flex; justify-content: center; }
        #imageCanvas { 
            max-width: 100%; max-height: 100%; object-fit: contain;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            background-image: linear-gradient(45deg, #222 25%, transparent 25%), 
                linear-gradient(-45deg, #222 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #222 75%),
                linear-gradient(-45deg, transparent 75%, #222 75%);
            background-size: 20px 20px;
        }
        .info { font-size: 0.7rem; color: #666; text-align: center; }
    </style>
</head>
<body>

<header><h1>FLUID CURVE PHOTO EDITOR</h1></header>

<div class="main-container">
    <aside id="controls-panel">
        <div>
            <label style="font-size: 0.7rem; color:#888;">1. UPLOAD</label>
            <input type="file" id="imageLoader" accept="image/*" style="display:none"/>
            <button class="btn btn-gray" onclick="document.getElementById('imageLoader').click()">PILIH FOTO</button>
        </div>

        <div>
            <label style="font-size: 0.7rem; color:#888;">2. ADJUST CURVE</label>
            <div class="tabs" id="channelTabs">
                <div class="tab active" data-chan="all">RGB</div>
                <div class="tab" data-chan="r">RED</div>
                <div class="tab" data-chan="g">GREEN</div>
                <div class="tab" data-chan="b">BLUE</div>
            </div>
            
            <div id="curve-container">
                <canvas id="curveCanvas" width="256" height="256"></canvas>
            </div>
            <button class="btn btn-gray" id="resetCurve" style="padding: 6px; font-size: 0.7rem;">RESET CHANNEL</button>
        </div>

        <p class="info">Klik garis untuk tambah titik.<br>Double-click titik untuk hapus.</p>
        <a id="downloadLink" class="btn btn-green disabled">DOWNLOAD PNG</a>
    </aside>

    <main id="preview-panel">
        <div class="canvas-wrapper">
            <canvas id="imageCanvas"></canvas>
        </div>
    </main>
</div>

<script>
    const imageLoader = document.getElementById('imageLoader');
    const imageCanvas = document.getElementById('imageCanvas');
    const imgCtx = imageCanvas.getContext('2d', { willReadFrequently: true });
    const curveCanvas = document.getElementById('curveCanvas');
    const curveCtx = curveCanvas.getContext('2d');
    const downloadLink = document.getElementById('downloadLink');

    let originalImgData = null;
    let currentChannel = 'all';
    let draggedPointIndex = -1;
    
    const channelData = {
        all: [{ x: 0, y: 256 }, { x: 256, y: 0 }],
        r: [{ x: 0, y: 256 }, { x: 256, y: 0 }],
        g: [{ x: 0, y: 256 }, { x: 256, y: 0 }],
        b: [{ x: 0, y: 256 }, { x: 256, y: 0 }]
    };

    // ALGORITMA FLUID: Monotone Cubic Spline
    function getSplineLUT(pts) {
        const n = pts.length;
        const x = pts.map(p => p.x);
        const y = pts.map(p => 256 - p.y); // Invert Y untuk hitungan matematis
        
        const lut = new Uint8ClampedArray(256);
        
        // Hitung selisih (secants)
        const dx = [], dy = [], ms = [];
        for (let i = 0; i < n - 1; i++) {
            dx[i] = x[i+1] - x[i];
            dy[i] = y[i+1] - y[i];
            ms[i] = dy[i] / dx[i];
        }

        // Hitung tangen (derivatives)
        const c1s = [ms[0]];
        for (let i = 0; i < n - 2; i++) {
            const m = ms[i], mNext = ms[i+1];
            if (m * mNext <= 0) {
                c1s.push(0);
            } else {
                const common_ = dx[i] + dx[i+1];
                c1s.push(3 * common_ / ((common_ + dx[i+1]) / m + (common_ + dx[i]) / mNext));
            }
        }
        c1s.push(ms[n - 2]);

        // Hitung koefisien polinomial
        const c2s = [], c3s = [];
        for (let i = 0; i < n - 1; i++) {
            const c1 = c1s[i], m = ms[i], invDx = 1 / dx[i], common_ = c1 + c1s[i+1] - 2 * m;
            c2s.push((m - c1 - common_) * invDx);
            c3s.push(common_ * invDx * invDx);
        }

        // Isi LUT 0-255
        for (let i = 0; i < 256; i++) {
            let j = n - 2;
            while (j > 0 && x[j] > i) j--;
            
            const diff = i - x[j];
            lut[i] = y[j] + c1s[j] * diff + c2s[j] * diff * diff + c3s[j] * diff * diff * diff;
        }
        return lut;
    }

    function init() {
        setupTabs();
        setupCurveEvents();
        drawCurve();
        imageLoader.onchange = handleUpload;
        document.getElementById('resetCurve').onclick = () => {
            channelData[currentChannel] = [{ x: 0, y: 256 }, { x: 256, y: 0 }];
            drawCurve(); applyCurve();
        };
        downloadLink.onclick = (e) => {
            if (downloadLink.classList.contains('disabled')) return e.preventDefault();
            downloadLink.href = imageCanvas.toDataURL("image/png");
            downloadLink.download = "fluid_edit.png";
        };
    }

    function setupTabs() {
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelector('.tab.active').classList.remove('active');
                tab.classList.add('active');
                currentChannel = tab.dataset.chan;
                drawCurve();
            };
        });
    }

    function handleUpload(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                imageCanvas.width = img.width;
                imageCanvas.height = img.height;
                imgCtx.drawImage(img, 0, 0);
                originalImgData = imgCtx.getImageData(0, 0, img.width, img.height);
                downloadLink.classList.remove('disabled');
                applyCurve();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    function drawCurve() {
        curveCtx.clearRect(0,0,256,256);
        curveCtx.strokeStyle = '#333';
        for(let i=1; i<4; i++) {
            curveCtx.beginPath(); curveCtx.moveTo(i*64, 0); curveCtx.lineTo(i*64, 256); curveCtx.stroke();
            curveCtx.beginPath(); curveCtx.moveTo(0, i*64); curveCtx.lineTo(256, i*64); curveCtx.stroke();
        }

        const colors = { all: '#fff', r: '#ff4444', g: '#44ff44', b: '#4444ff' };
        const lut = getSplineLUT(channelData[currentChannel]);
        
        curveCtx.strokeStyle = colors[currentChannel];
        curveCtx.lineWidth = 2;
        curveCtx.beginPath();
        curveCtx.moveTo(0, 256 - lut[0]);
        for(let x=1; x<256; x++) curveCtx.lineTo(x, 256 - lut[x]);
        curveCtx.stroke();

        channelData[currentChannel].forEach(p => {
            curveCtx.fillStyle = colors[currentChannel];
            curveCtx.beginPath(); curveCtx.arc(p.x, p.y, 5, 0, Math.PI*2); curveCtx.fill();
            curveCtx.strokeStyle = '#fff'; curveCtx.stroke();
        });
    }

    function applyCurve() {
        if (!originalImgData) return;
        const luts = {
            all: getSplineLUT(channelData.all),
            r: getSplineLUT(channelData.r),
            g: getSplineLUT(channelData.g),
            b: getSplineLUT(channelData.b)
        };
        const newImgData = imgCtx.createImageData(imageCanvas.width, imageCanvas.height);
        const src = originalImgData.data;
        const dst = newImgData.data;

        for (let i = 0; i < src.length; i += 4) {
            dst[i]   = luts.all[luts.r[src[i]]];   
            dst[i+1] = luts.all[luts.g[src[i+1]]]; 
            dst[i+2] = luts.all[luts.b[src[i+2]]]; 
            dst[i+3] = src[i+3];                   
        }
        imgCtx.putImageData(newImgData, 0, 0);
    }

    function setupCurveEvents() {
        const getXY = (e) => {
            const rect = curveCanvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        };
        curveCanvas.onmousedown = (e) => {
            const pos = getXY(e);
            const pts = channelData[currentChannel];
            const idx = pts.findIndex(p => Math.hypot(p.x - pos.x, p.y - pos.y) < 12);
            if(idx !== -1) draggedPointIndex = idx;
            else if(pos.x > 0 && pos.x < 256) {
                const newPt = { x: pos.x, y: pos.y };
                pts.push(newPt);
                pts.sort((a,b) => a.x - b.x);
                draggedPointIndex = pts.indexOf(newPt);
                drawCurve(); applyCurve();
            }
        };
        window.onmousemove = (e) => {
            if(draggedPointIndex === -1) return;
            const pos = getXY(e);
            const pts = channelData[currentChannel];
            let mx = pos.x;
            let my = Math.max(0, Math.min(256, pos.y));
            if(draggedPointIndex === 0) mx = 0;
            else if(draggedPointIndex === pts.length-1) mx = 256;
            else mx = Math.max(pts[draggedPointIndex-1].x + 2, Math.min(pts[draggedPointIndex+1].x - 2, mx));
            pts[draggedPointIndex].x = mx; pts[draggedPointIndex].y = my;
            drawCurve(); applyCurve();
        };
        window.onmouseup = () => draggedPointIndex = -1;
        curveCanvas.ondblclick = (e) => {
            const pos = getXY(e);
            const pts = channelData[currentChannel];
            const idx = pts.findIndex(p => Math.hypot(p.x - pos.x, p.y - pos.y) < 12);
            if(idx > 0 && idx < pts.length - 1) {
                pts.splice(idx, 1);
                drawCurve(); applyCurve();
            }
        };
    }
    init();
</script>
</body>
</html>
